name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build app bundle
        run: pyinstaller src/dicom_editor/app.py --name DicomTagEditor --windowed --paths src --collect-data dicom_editor

      - name: Package artifact
        run: python scripts/package_artifact.py

      - name: Upload artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: DicomTagEditor-${{ matrix.os }}
          path: dist/*.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
